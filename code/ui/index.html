<!doctype html>
<html lang="it" translate="no" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="google" content="notranslate" />
    <meta name="theme-color" content="#e8e0d8" />
    <title>PicoClaw</title>
  </head>
  <body class="notranslate" translate="no">
    <div id="root">
      <div
        style="
          min-height: 100vh;
          display: grid;
          place-items: center;
          font: 600 18px/1.4 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
          color: rgba(255, 255, 255, 0.86);
          background: radial-gradient(1200px 700px at 30% 20%, rgba(255,255,255,0.08), transparent 60%),
            #0b0d11;
        "
      >
        Avvio PicoClaw…
      </div>
    </div>
    <script>
      (function () {
        function showError(kind, msg) {
          try {
            var root = document.getElementById('root')
            if (!root) return
            var pre = document.createElement('pre')
            pre.style.cssText =
              'position:fixed;inset:12px;z-index:99999;padding:12px 14px;border-radius:14px;' +
              'background:rgba(20,10,10,0.92);color:rgba(255,235,235,0.95);' +
              'border:1px solid rgba(255,120,120,0.25);overflow:auto;' +
              'font:600 14px/1.45 ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;'
            pre.textContent = 'PicoClaw UI error (' + kind + '):\n\n' + msg
            root.innerHTML = ''
            root.appendChild(pre)
          } catch {}
        }

        window.addEventListener('error', function (e) {
          var msg = (e && e.message) || String(e)
          showError('error', msg)
        })

        window.addEventListener('unhandledrejection', function (e) {
          var msg = (e && e.reason && (e.reason.stack || e.reason.message)) || String(e.reason || e)
          showError('unhandledrejection', msg)
        })
      })()
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
